[package]
name = "cranelift-jit"
version = "0.134.0"
authors = ["The Cranelift Project Developers"]
description = "A JIT library backed by Cranelift"
repository = "https://github.com/bytecodealliance/wasmtime"
documentation = "https://docs.rs/cranelift-jit"
license = "Apache-2.0 WITH LLVM-exception"
readme = "README.md"
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
cranelift-codegen = { workspace = true }
cranelift-control = { workspace = true }
cranelift-entity = { workspace = true }
cranelift-module = { workspace = true }
cranelift-native = { workspace = true }
hashbrown = { workspace = true }
libc = { workspace = true }
log = { workspace = true }
memmap2 = "0.9.10"
region = "3.0.2"
target-lexicon = { workspace = true }
wasmtime-jit-icache-coherence = { workspace = true }
wasmtime-unwinder = { workspace = true, optional = true, features = ["cranelift"] }

[target.'cfg(windows)'.dependencies.windows-sys]
workspace = true
features = [
    "Win32_Foundation",
    "Win32_System_LibraryLoader",
    "Win32_System_Memory",
]

[features]
default = ["std"]
std = ["cranelift-codegen/std", "cranelift-module/std", "cranelift-native/std"]

wasmtime-unwinder = ["dep:wasmtime-unwinder"]

[dev-dependencies]
cranelift = { path = "../umbrella" }
cranelift-frontend = { workspace = true }
cranelift-entity = { workspace = true }
