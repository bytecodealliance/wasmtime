[package]
name = "cranelift-object"
version = "0.134.0"
authors = ["The Cranelift Project Developers"]
description = "Emit Cranelift output to native object files with `object`"
repository = "https://github.com/bytecodealliance/wasmtime"
documentation = "https://docs.rs/cranelift-object"
license = "Apache-2.0 WITH LLVM-exception"
readme = "README.md"
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
cranelift-codegen = { workspace = true }
cranelift-control = { workspace = true }
cranelift-module = { workspace = true }
gimli = { workspace = true, features = ["write"], optional = true }
hashbrown = { workspace = true }
log = { workspace = true }
object = { workspace = true, features = ["write"] }
target-lexicon = { workspace = true }

[features]
default = ["std", "unwind"]
std = ["cranelift-codegen/std", "cranelift-module/std", "object/std", "target-lexicon/std", "anyhow/std"]

# Enables `.eh_frame` section emission via `ObjectBuilder::unwind_info`.
unwind = ["dep:gimli", "cranelift-codegen/unwind"]

[dev-dependencies]
cranelift-frontend = { workspace = true }
cranelift-entity = { workspace = true }
cranelift-codegen = { workspace = true, features = ["x86", "arm64"] }
