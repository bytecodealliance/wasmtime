[package]
name = "cranelift-isle-veri-isaspec"
version = "0.1.0"
publish = false
edition.workspace = true

[dependencies]
cranelift-isle-veri-aslp = { path = "../aslp" }
cranelift-isle = { path = "../../isle" }
cranelift-codegen = { workspace = true, features = ["all-arch"] }
anyhow = { workspace = true, features = ['std', 'backtrace'] }
clap = { workspace = true, features = ['default'] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
itertools = { workspace = true }
